name: Validate Skills

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  AGENTSKILLS_VALIDATE_VERSION: 1.0.1
  GOLANGCI_LINT_VERSION: v2.10.1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: false

      - name: Install golangci-lint
        run: |
          go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Validate all skills
        run: |
          for skill_dir in skills/*/; do
            echo "Validating ${skill_dir}..."
            npx --yes "agentskills-validate@${AGENTSKILLS_VALIDATE_VERSION}" "${skill_dir}"
          done

      - name: Run eval tests
        working-directory: evals
        run: go test -count=1 ./...

      - name: Verify golangci-lint config
        run: golangci-lint config verify --config skills/go-linting/assets/golangci.yml
